<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tic Tac Toe</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
margin-top:50px;
}

h1{
margin-bottom:20px;
}

.board{
display:grid;
grid-template-columns:repeat(3,100px);
gap:10px;
justify-content:center;
margin-top:20px;
}

.cell{
width:100px;
height:100px;
background:#1e293b;
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
cursor:pointer;
border-radius:8px;
}

.cell:hover{
background:#334155;
}

button{
margin-top:20px;
padding:10px 20px;
border:none;
background:#38bdf8;
cursor:pointer;
border-radius:6px;
}

a{
display:block;
margin-top:25px;
color:#38bdf8;
}

</style>
</head>

<body>

<h1>Tic Tac Toe</h1>

<p id="status">Your Turn (X)</p>

<div class="board">

<div class="cell" onclick="move(this,0)"></div>
<div class="cell" onclick="move(this,1)"></div>
<div class="cell" onclick="move(this,2)"></div>

<div class="cell" onclick="move(this,3)"></div>
<div class="cell" onclick="move(this,4)"></div>
<div class="cell" onclick="move(this,5)"></div>

<div class="cell" onclick="move(this,6)"></div>
<div class="cell" onclick="move(this,7)"></div>
<div class="cell" onclick="move(this,8)"></div>

</div>

<button onclick="restart()">Restart Game</button>

<a href="index.html">Back to Portfolio</a>

<script>

let board=["","","","","","","","",""]
let gameOver=false

function move(cell,index){

if(board[index]!=="" || gameOver) return

board[index]="X"
cell.innerText="X"

checkWinner()

computerMove()

}

function computerMove(){

if(gameOver) return

let empty=[]

for(let i=0;i<board.length;i++){
if(board[i]=="") empty.push(i)
}

let random=empty[Math.floor(Math.random()*empty.length)]

board[random]="O"

document.getElementsByClassName("cell")[random].innerText="O"

checkWinner()

}

function checkWinner(){

const wins=[
[0,1,2],
[3,4,5],
[6,7,8],
[0,3,6],
[1,4,7],
[2,5,8],
[0,4,8],
[2,4,6]
]

for(let combo of wins){

let a=combo[0]
let b=combo[1]
let c=combo[2]

if(board[a] && board[a]==board[b] && board[a]==board[c]){

document.getElementById("status").innerText=
board[a]+" Wins!"

gameOver=true
return
}

}

}

function restart(){

board=["","","","","","","","",""]
gameOver=false

let cells=document.getElementsByClassName("cell")

for(let cell of cells){
cell.innerText=""
}

document.getElementById("status").innerText="Your Turn (X)"

}

</script>

</body>
</html>
